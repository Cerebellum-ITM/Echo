# Local CommitCraft override for the Echo project.
#
# Disables the auto-changelog refiner stage. We maintain CHANGELOG.md
# manually under the Keep-a-Changelog convention: every meaningful
# commit appends to [Unreleased], and version bumps promote that block
# to a new [X.Y.Z] section in the same commit that touches the version
# constant in internal/repl/repl.go.
#
# Without this override, commitcraft auto-inserts a [X.Y.<patch>]
# section per commit (bump_strategy="patch") which conflicts with the
# manual policy.
[changelog]
  enabled = false

[release_config]
  version = "v0.3.1"
  # GH_TOKEN = "ghp_123456789dummytoken"
  repository = "Cerebellum-ITM/Echo"
  binary_assets_path = "bin/"
  auto_build = true
  build_tool = "make"
  build_target = "build_release"
